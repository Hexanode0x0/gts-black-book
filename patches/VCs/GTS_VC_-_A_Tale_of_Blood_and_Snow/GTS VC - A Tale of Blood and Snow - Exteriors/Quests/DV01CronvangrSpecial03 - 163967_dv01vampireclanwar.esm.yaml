    Entry:
      TargetLanguage: English
      Value: The leader of Stendarr's Beacon has gone to request aid from another group of Vigilants based in a ravine near Dawnstar. If I can intercept her before she arrives, I can wipe out the Stendarr's Beacon forces with the rest of the Vigil none the wiser.
