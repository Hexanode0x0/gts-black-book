- Index: 10
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: Yulf lies dead within the mines of Mor Khazgur. Chief Larak told me to inform his son, Olur of his tragic demise. He emphasized I should remain blunt and truthful in this act.
- Index: 15
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I have returned from the mines of Mor Khazgur. I informed Olur of Yulf's demise. He worries the Agra Crun warriors may be hunting his friends. I was tasked to warn a Khajiit by the name of Azita.
- Index: 41
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: Olur asked me to warn Yulf's friends about the Agra Crun. Azita lies dead. I must find out what happened.
- Index: 42
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: Olur asked me to warn Yulf's friends about the Agra Crun. Azita lies dead. I should read the note I found.
- Index: 43
  LogEntries:
