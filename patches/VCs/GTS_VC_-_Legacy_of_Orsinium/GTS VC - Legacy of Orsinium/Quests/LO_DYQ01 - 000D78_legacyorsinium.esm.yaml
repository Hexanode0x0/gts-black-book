- Index: 10
  Flags:
  - StartUpStage
  - KeepInstanceDataFromHereOn
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I've been tasked by Chief Burguk to retrieve a Briar Heart. According to him, eating one will grant "the power of ten orcs". Whether it is true or not, I must find one and deliver it to him.
- Index: 15
  LogEntries:
  - Flags: []
- Index: 20
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: Chief Burguk thinks a stronger Briar Heart is required for its effects to take place. A strong warrior named Iceheart has been seen in a place called <Alias=ForswornLocation>. I must kill him, take his heart and bring it back to Burguk.
- Index: 25
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: Iceheart is dead. I must now take the heart from his chest.
- Index: 30
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I have slain the Reachman warrior named Iceheart and retrieved his heart. Burguk will be pleased! I must return to Dushnikh Yal and deliver the heart to him.
- Index: 40
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I have slain the Reachman warrior named Iceheart and retrieved his heart, which seems to have angered the Forsworn. Dushnikh Yal is under attack. I must defend the stronghold at once.
- Index: 50
  LogEntries:
  - Flags: []
    Entry:
      TargetLanguage: English
      Value: I have slain the Reachman warrior named Iceheart and retrieved his heart. I then helped slaughter the attackers and defended the stronghold. I must now talk to Burguk.
- Index: 100
  LogEntries:
  - Flags:
    - CompleteQuest
    Entry:
      TargetLanguage: English
      Value: I have slain the Reachman warrior named Iceheart and retrieved his heart. I then helped slaughter the attackers and defended the stronghold. Burguk did not need the Briar Heart to prove himself to be a strong warrior, deciding to pick up his training instead.
- Index: 300
  LogEntries:
  - Flags:
    - FailQuest
    Entry:
      TargetLanguage: English
      Value: Burguk is dead.
